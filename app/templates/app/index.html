{% extends "app/base.html" %}
{% load static %}

{% block title %} {{ block.super }} Início {% endblock title %}

{% block h2 %}
    {{ titulo }}
{% endblock h2 %}

{% block lead %}
    De autoria de: {{ autor }}
{% endblock lead %}

{% block content %}
    {{ resumo }}
    <div class="container my-4">
      <div class="row">
        <div class="col-6 col-md-4">
          <img class="img-fluid" src="{% static 'app/cover.jfif' %}" alt="cover" />
        </div>
        <div class="col-6 col-md-4">
          <img class="img-fluid" src="{% static 'app/percy.jfif' %}" alt="percy" />
        </div>
        <div class="col-6 col-md-4">
          <img class="img-fluid" src="{% static 'app/Percy-Jackson-S2.webp' %}" alt="foto" />
        </div>
      </div>
    </div>
    <div class="container my-4">
      <div class="row">
        <div class="col">
            <img class="w-100" src="{% static 'app/serie.jfif' %}" alt="foto" />
        </div>
      </div>
    </div>
{% endblock content %}
